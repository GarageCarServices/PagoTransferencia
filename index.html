<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago por transferencia</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      max-width: 520px;
      margin: 40px auto;
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .dato {
      margin-bottom: 20px;
    }

    .label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    .valor {
      font-size: 18px;
    }

    button {
      margin-top: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.9;
    }

    .copiado {
      display: none;
      margin-top: 16px;
      color: green;
      font-size: 14px;
    }

    .nota {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #ddd;
      line-height: 1.6;
    }
  </style>

</head>

<body>
  <div class="card">
    <h1>Pago por transferencia</h1>

```
<div class="dato">
  <span class="label">Titular:</span>
  <span class="valor" id="titular">OSCAR ANDINO</span><br>
  <button onclick="copiar('titular')">Copiar titular</button>
</div>

<div class="dato">
  <span class="label">Banco:</span>
  <span class="valor" id="banco">Banco Agrícola</span><br>
  <button onclick="copiar('banco')">Copiar banco</button>
</div>

<div class="dato">
  <span class="label">Cuenta de ahorro:</span>
  <span class="valor" id="cuenta">5791713953</span><br>
  <button onclick="copiar('cuenta')">Copiar cuenta</button>
</div>

<button onclick="copiarTodo()">Copiar todos los datos</button>

<div class="copiado" id="mensaje">Copiado al portapapeles</div>

<div class="nota">
  Por favor, envía tu comprobante por medio de WhatsApp.<br><br>
  Muchas gracias por tu compra.
</div>
```

  </div>

  <script>
    function mostrarMensaje() {
      const mensaje = document.getElementById("mensaje");
      mensaje.style.display = "block";
      setTimeout(() => {
        mensaje.style.display = "none";
      }, 2000);
    }

    function copiar(id) {
      const texto = document.getElementById(id).innerText;
      navigator.clipboard.writeText(texto)
        .then(() => mostrarMensaje())
        .catch(() => alert("No se pudo copiar"));
    }

    function copiarTodo() {
      const texto =
`Titular: OSCAR ANDINO
Banco: Banco Agrícola
Cuenta de ahorro: 5791713953`;

      navigator.clipboard.writeText(texto)
        .then(() => mostrarMensaje())
        .catch(() => alert("No se pudo copiar"));
    }
  </script>

</body>
</html>
