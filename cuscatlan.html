<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Datos de transferencia para Banco Cuscatlán de Garage Car Services."
    />
    <title>Banco Cuscatlán | Garage Car Services</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand">
          <img
            class="brand-logo"
            src="./assets/images/logo-garage-car-services-icon.png"
            alt="Logo de Garage Car Services"
          />
          <div class="brand-copy">
            <h1>Garage Car Services</h1>
            <p>Pago por Transferencia Bancaria</p>
          </div>
        </div>
      </header>

      <main>
        <div class="utility-row">
          <a class="home-link" href="./index.html">Volver al inicio</a>
          <nav class="bank-switcher" aria-label="Cambiar de banco">
            <a href="./banco-agricola.html">Banco Agrícola</a>
            <a href="./bac.html">BAC</a>
          </nav>
        </div>

        <section aria-labelledby="titulo-banco">
          <div class="page-intro">
            <h2 id="titulo-banco">Cuenta Banco Cuscatlán</h2>
            <img
              class="bank-badge"
              src="./assets/images/cuscatlan-icon.png"
              alt="Banco Cuscatlán"
            />
          </div>

          <div class="account-card">
            <div class="instruction-banner">
              Toca cualquier botón para copiar el dato y pegarlo en tu app bancaria.
            </div>
            <div class="account-body">
              <div class="account-grid">
                <button class="copy-button" data-copy-label="Nombre" data-copy-value="OSCAR">
                  <span class="copy-label">Nombre</span>
                  <span class="copy-row">
                    <span class="copy-value">OSCAR</span>
                    <span class="copy-state">Toca para copiar</span>
                  </span>
                </button>

                <button class="copy-button" data-copy-label="Apellido" data-copy-value="ANDINO">
                  <span class="copy-label">Apellido</span>
                  <span class="copy-row">
                    <span class="copy-value">ANDINO</span>
                    <span class="copy-state">Toca para copiar</span>
                  </span>
                </button>

                <button
                  class="copy-button"
                  data-copy-label="Tipo de cliente"
                  data-copy-value="Persona Natural"
                >
                  <span class="copy-label">Tipo de Cliente</span>
                  <span class="copy-row">
                    <span class="copy-value">Persona Natural</span>
                    <span class="copy-state">Toca para copiar</span>
                  </span>
                </button>

                <button
                  class="copy-button copy-primary"
                  data-copy-label="Número de cuenta"
                  data-copy-value="401495000065181"
                >
                  <span class="copy-label">Número de Cuenta</span>
                  <span class="copy-row">
                    <span class="copy-value">401495000065181</span>
                    <span class="copy-state">Toca para copiar</span>
                  </span>
                </button>

                <button
                  class="copy-button"
                  data-copy-label="Tipo de cuenta"
                  data-copy-value="AHORRO"
                >
                  <span class="copy-label">Tipo de Cuenta</span>
                  <span class="copy-row">
                    <span class="copy-value">AHORRO</span>
                    <span class="copy-state">Toca para copiar</span>
                  </span>
                </button>

                <button
                  class="copy-button"
                  data-copy-label="Correo electrónico"
                  data-copy-value="gcs.agtisa@gmail.com"
                >
                  <span class="copy-label">Correo Electrónico</span>
                  <span class="copy-row">
                    <span class="copy-value">gcs.agtisa@gmail.com</span>
                    <span class="copy-state">Toca para copiar</span>
                  </span>
                </button>

                <button
                  class="copy-button"
                  data-copy-label="Concepto"
                  data-copy-value="Por pago de servicios automotriz"
                >
                  <span class="copy-label">Concepto</span>
                  <span class="copy-row">
                    <span class="copy-value">Por pago de servicios automotriz</span>
                    <span class="copy-state">Toca para copiar</span>
                  </span>
                </button>

              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <h3>¡Gracias por preferirnos!</h3>
        <p>Búscanos en nuestras Redes Sociales</p>
        <div class="social-links" aria-label="Redes sociales">
          <a
            href="https://www.facebook.com/profile.php?id=61552615846566"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Facebook"
          >
            <img src="./assets/images/facebook-icon.png" alt="Facebook" />
          </a>
          <a
            href="https://www.instagram.com/garagecarservices.sv?igsh=MWFlMjdjeHM0c3hldA=="
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram"
          >
            <img src="./assets/images/instagram-icon.png" alt="Instagram" />
          </a>
          <a
            href="https://www.tiktok.com/@garagecarservices?_r=1&_t=ZS-95OswjWu3SW"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="TikTok"
          >
            <img src="./assets/images/tiktok-icon.png" alt="TikTok" />
          </a>
          <a
            href="https://wa.me/50377850367"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="WhatsApp"
          >
            <img src="./assets/images/whatsapp-icon.png" alt="WhatsApp" />
          </a>
        </div>
      </footer>
    </div>

    <div class="toast" data-toast aria-live="polite"></div>
    <script src="./script.js"></script>
  </body>
</html>
